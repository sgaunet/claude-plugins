# Linter Workflow
# Runs golangci-lint on every push to validate code quality.
# Tooling (Go, task, golangci-lint) is installed by mise from mise.toml, so the
# exact same versions run locally and in CI.
# Docs: https://golangci-lint.run | https://mise.jdx.dev

name: linter

on:
  push:
    # Optionally ignore documentation changes
    # paths-ignore:
    #   - '**.md'
    #   - 'docs/**'
  # Optionally run on pull requests
  # pull_request:
  #   branches: [main]

permissions:
  contents: read

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Install the tools pinned in mise.toml (go, task, golangci-lint, ...)
      - uses: jdx/mise-action@v3
        with:
          install: true # [default: true] run `mise install`
          cache: true # [default: true] cache mise using GitHub's cache

      # Run linter via Task
      # Requires: Taskfile.yml with a 'lint' task (e.g. `golangci-lint run`)
      - name: Run linter
        shell: /usr/bin/bash {0}
        run: |
          task lint

# Optional: Cancel outdated runs to save CI minutes
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true
