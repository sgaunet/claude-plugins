# Snapshot Build Workflow
# Tests the release process on every push without publishing artifacts.
# Validates GoReleaser config and cross-compilation, catching release issues
# before tagging. Tooling is installed by mise from mise.toml.
# Docs: https://goreleaser.com | https://mise.jdx.dev

name: snapshot

on:
  push:
    # Run on every commit pushed to any branch ('**' also matches nested
    # branches like feature/foo). Tag pushes don't match a branches filter,
    # so they're excluded automatically and handled by release.yml.
    branches:
      - '**'

permissions:
  contents: read

jobs:
  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for GoReleaser changelog

      # Install the tools pinned in mise.toml (go, task, goreleaser, ...)
      - uses: jdx/mise-action@v3
        with:
          install: true # [default: true] run `mise install`
          cache: true # [default: true] cache mise using GitHub's cache

      # OPTIONAL — publishing Docker images?
      # 1. Uncomment the docker tools in mise.toml (buildx, docker-cli).
      # 2. Uncomment the steps below so multi-arch builds and registry pushes work.
      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3
      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # Create snapshot build (GoReleaser snapshot mode, no publishing)
      # Requires: Taskfile.yml with a 'snapshot' task
      - name: Create snapshot release
        shell: /usr/bin/bash {0}
        run: |
          task snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment if using GoReleaser Pro
          # GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

# Optional: Cancel outdated runs to save CI minutes
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true
