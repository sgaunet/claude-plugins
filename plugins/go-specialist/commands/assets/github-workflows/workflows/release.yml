# Release Workflow
# Creates production releases when Git tags are pushed (binaries, package
# distributions, and optionally Docker images). Tooling is installed by mise
# from mise.toml, so CI uses the same versions as local development.
# Docs: https://goreleaser.com | https://mise.jdx.dev

name: release

on:
  push:
    # Trigger on all tags
    tags:
      - '**'  # All tags (v1.0.0, v2.1.3, etc.)

    # Alternative: Only semantic version tags
    # tags:
    #   - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # Required to create GitHub releases
  packages: write   # Required to publish Docker images to GHCR (optional)

jobs:
  goreleaser-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for GoReleaser changelog generation

      # Install the tools pinned in mise.toml (go, task, goreleaser, ...)
      - uses: jdx/mise-action@v3
        with:
          install: true # [default: true] run `mise install`
          cache: true # [default: true] cache mise using GitHub's cache

      # OPTIONAL — publishing Docker images?
      # 1. Uncomment the docker tools in mise.toml (buildx, docker-cli).
      # 2. Uncomment the steps below so multi-arch builds and registry pushes work.
      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3
      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # Create production release
      # Requires: Taskfile.yml with a 'release' task (e.g. `goreleaser release --clean`)
      - name: Create release
        shell: /usr/bin/bash {0}
        run: |
          task release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment if using GoReleaser Pro
          # GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          # Uncomment if publishing to a Homebrew tap
          # HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

# Release artifacts published:
# - GitHub Release with binaries for all platforms
# - Docker images to GitHub Container Registry (if configured + steps above enabled)
# - Homebrew formula (if configured in .goreleaser.yml)
# - Checksums and signatures

# Usage:
# 1. Create and push tag: git tag -a v1.0.0 -m "Release v1.0.0" && git push origin v1.0.0
# 2. Workflow triggers automatically
# 3. Check progress: https://github.com/OWNER/REPO/actions
# 4. View release: https://github.com/OWNER/REPO/releases
