# GitLab CI/CD Pipeline for Go Projects
#
# Tooling (Go, task, golangci-lint, goreleaser) is installed by mise from
# mise.toml, so every job uses the EXACT same tool versions as local
# development. The jobs simply run `task ...` through mise.
#
# This pipeline provides:
# - Unit testing on every push
# - Linting on every push
# - Snapshot builds (test releases without publishing)
# - Production releases on Git tags
#
# Prerequisites:
# - Go project with go.mod
# - mise.toml (generated alongside this file)
# - Taskfile.yml with: test, lint, snapshot, release tasks
# - .goreleaser.yml configuration
# - A GitLab Runner that can run container images
#
# Docs: https://mise.jdx.dev | https://taskfile.dev | https://goreleaser.com

# Pipeline stages
stages:
  - test
  - release

# Shared configuration: every job runs in the official mise image and installs
# the tools pinned in mise.toml before running.
default:
  image: jdx/mise:latest
  cache:
    # Cache the mise tool installs between pipelines for speed.
    key:
      files:
        - mise.toml
    paths:
      - .mise
  variables:
    MISE_DATA_DIR: .mise
  before_script:
    - mise trust
    - mise install

# Unit Tests
# Runs on every push to validate code changes.
unit-tests:
  stage: test
  script:
    - mise exec -- task test
  tags:
    - gitlab-org-docker  # CUSTOMIZE: Update to match your runner tags

# Linter
# Runs golangci-lint on every push.
linter:
  stage: test
  script:
    - mise exec -- task lint
  tags:
    - gitlab-org-docker  # CUSTOMIZE: Update to match your runner tags

# Coverage Reporting (Optional)
# Uncomment to enable coverage tracking and the GitLab coverage badge.
# coverage:
#   stage: test
#   script:
#     - mise exec -- go generate ./...
#     - mise exec -- go test -coverpkg=./... -coverprofile=profile.cov ./...
#     # CUSTOMIZE: Exclude packages from coverage if needed
#     # - sed -i '/cmd\//d' profile.cov
#     - mise exec -- go tool cover -func profile.cov
#     - rm profile.cov
#   coverage: '/^total:\s+\(statements\)\s+\d+\.\d+%/'
#   tags:
#     - gitlab-org-docker  # CUSTOMIZE: Update to match your runner tags

# Build Snapshot
# Tests the release build process on every push without publishing.
# Validates the GoReleaser configuration before tagging.
build-snapshot:
  stage: test
  variables:
    # Disable shallow cloning so GoReleaser can generate the changelog
    GIT_DEPTH: 0
  script:
    - mise exec -- task snapshot
  tags:
    - gitlab-org-docker  # CUSTOMIZE: Update to match your runner tags

# Build Release
# Creates a production release on Git tag push (binaries, GitLab Release, and
# optionally Docker images — see the Docker block below).
build-release:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG  # Only run on Git tag push
    # CUSTOMIZE: Filter specific tag patterns
    # - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/  # Only semantic version tags
  variables:
    # Disable shallow cloning so GoReleaser can generate the changelog
    GIT_DEPTH: 0
  script:
    - mise exec -- task release
  tags:
    - gitlab-org-docker  # CUSTOMIZE: Update to match your runner tags

# ============================================================================
# OPTIONAL — Publishing Docker images with GoReleaser
# ============================================================================
# GoReleaser builds/pushes images via the Docker daemon. To enable that on
# GitLab CI:
#   1. Uncomment the docker tools in mise.toml (buildx, docker-cli).
#   2. Add a Docker-in-Docker service + registry auth to build-snapshot and
#      build-release. Built-in variables used: CI_REGISTRY, CI_REGISTRY_IMAGE,
#      CI_REGISTRY_USER, CI_JOB_TOKEN.
#
# .docker-dind:
#   services:
#     - docker:dind          # CUSTOMIZE: pin a version, e.g. docker:27-dind
#   variables:
#     DOCKER_HOST: tcp://docker:2375/
#   before_script:
#     - mise trust
#     - mise install
#     - mkdir -p "$HOME/.docker"
#     - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_JOB_TOKEN}\"}}}" > "$HOME/.docker/config.json"
#
# Then make the release jobs extend it, e.g.:
# build-release:
#   extends: .docker-dind
#   ...
